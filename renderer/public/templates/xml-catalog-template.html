<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{year}} {{model}} | UV Catalog</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Use fallback fonts for now - Resonate loading issues */
    .resonate-fallback {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-weight: 900;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000000; /* pitch black like price drop */
      color: #ffffff;
      height: 100vh;
      width: 100vw;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }

    .catalog-card-container {
      position: relative;
      width: 1080px;
      height: 1350px; /* 4:5 aspect ratio */
      background: linear-gradient(45deg, #1bfc06, #2eff14, #1bfc06, #0ef800);
      background-size: 400% 400%;
      animation: fluorescent-glow 3s ease-in-out infinite alternate;
      border-radius: 0;
      padding: 20px; /* Fluorescent border thickness */
      box-sizing: border-box;
    }

    @keyframes fluorescent-glow {
      0% {
        background-position: 0% 50%;
        filter: brightness(1) saturate(1.2);
      }
      100% {
        background-position: 100% 50%;
        filter: brightness(1.2) saturate(1.5);
      }
    }

    .catalog-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      border-radius: 0;
    }

    .catalog-bg-image {
      position: absolute;
      top: -50px; /* Push image higher */
      left: 0;
      width: 100%;
      height: calc(100% + 50px); /* Compensate for top offset */
      object-fit: contain; /* Changed from cover to contain to show full image */
      object-position: center top; /* Align to top */
      z-index: 1;
      background: #f5f5f5; /* Light background for better contrast */
    }



    .content-section {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 462px; /* 10% bigger than 420px */
      padding: 30px 28px 30px 28px; /* More padding for taller overlay */
      display: flex;
      flex-direction: column;
      justify-content: space-between; /* Better distribution */
      gap: 18px; /* Slightly larger gap */
      background: rgba(0, 0, 0, 0.85); /* More transparent for glass effect */
      backdrop-filter: blur(15px); /* Strong glass morphism */
      -webkit-backdrop-filter: blur(15px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 2;
    }

    .header h1 {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-size: 3.2rem; /* Made much bigger */
      font-weight: 900; /* Black weight */
      line-height: 1.0; /* Tighter line height */
      margin-bottom: 8px; /* Slightly more margin */
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 1rem; /* Reduced from 1.2rem */
      color: #aaaaaa;
      font-weight: 500;
      margin-bottom: 12px; /* Reduced margin */
    }

    .highlight {
      color: #ffffff;
      font-weight: 600;
    }

    .specs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .spec-item {
      background: rgba(255, 255, 255, 0.08); /* More glass visibility */
      padding: 18px 16px; /* Reduced padding */
      border-radius: 14px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.15); /* More visible border */
      backdrop-filter: blur(20px); /* Stronger blur */
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), /* Deeper shadow */
                  inset 0 1px 0 rgba(255, 255, 255, 0.2); /* Inner highlight */
    }

    .spec-value {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-size: 1.8rem; /* Reduced from 2.2rem */
      font-weight: 900; /* Black weight */
      margin-bottom: 6px; /* Reduced margin */
      color: #ffffff;
    }

    .spec-label {
      font-size: 0.9rem;
      color: #888888;
      text-transform: uppercase;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .price-footer {
      display: flex;
      justify-content: space-between;
      align-items: stretch; /* Make cards same height */
      gap: 12px; /* Smaller gap */
      flex-shrink: 0; /* Prevent shrinking */
    }

    .price-card {
      background: rgba(255, 255, 255, 0.08); /* More visible glass */
      border: 1px solid rgba(255, 255, 255, 0.15); /* More visible border */
      border-radius: 12px; /* Smaller radius */
      padding: 12px 16px; /* Smaller padding */
      backdrop-filter: blur(20px); /* Stronger blur */
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), /* Deeper shadow */
                  inset 0 1px 0 rgba(255, 255, 255, 0.2); /* Inner highlight */
      text-align: center;
      flex: 1;
      min-height: 60px; /* Ensure minimum height */
    }

    .price-label {
      font-size: 0.75rem; /* Even smaller */
      color: #999999;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px; /* Smaller margin */
      line-height: 1.1;
    }

    .price-value {
      font-family: 'Resonate', 'Space Grotesk', sans-serif;
      font-size: 1.4rem; /* Further reduced */
      font-weight: 900; /* Black weight */
      color: #ffffff;
      line-height: 1.2;
    }

    .monthly-value {
      font-family: 'Resonate', 'Space Grotesk', sans-serif;
      font-size: 1.2rem; /* Further reduced */
      font-weight: 900; /* Black weight */
      color: #ffffff;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <div class="catalog-card-container">
    <div class="catalog-card-inner">
      <!-- Full Background Image -->
      <img src="{{catalogImageUrl}}" alt="{{year}} {{model}}" class="catalog-bg-image" onerror="this.style.display='none';" />
      
      <!-- Content Overlay (Bottom) -->
      <div class="content-section">
        <div class="header">
          <h1>{{year}} {{model}}</h1>
          <p class="subtitle"><span class="highlight">Premium Selection</span></p>
        </div>

      <div class="specs-grid">
        <!-- Top Row -->
        <div class="spec-item">
          <div class="spec-value">AED {{originalPrice}}</div>
          <div class="spec-label">Cash Price</div>
        </div>
        <div class="spec-item">
          <div class="spec-value">AED {{zeroDownPayment}}</div>
          <div class="spec-label">0% Down Payment</div>
        </div>
        <div class="spec-item">
          <div class="spec-value">AED {{twentyDownPayment}}</div>
          <div class="spec-label">20% Down Payment</div>
        </div>
        
        <!-- Bottom Row -->
        <div class="spec-item">
          <div class="spec-value">{{mileage}} KM</div>
          <div class="spec-label">Mileage</div>
        </div>
        <div class="spec-item">
          <div class="spec-value">{{horsepower}} HP</div>
          <div class="spec-label">Horsepower</div>
        </div>
        <div class="spec-item">
          <div class="spec-value">{{engine}}</div>
          <div class="spec-label">Engine</div>
        </div>
      </div>

      <!-- Removed price footer cards as requested -->
      </div>
    </div>
  </div>
</body>
</html>
