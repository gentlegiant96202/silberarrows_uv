<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Preview</title>
</head>
<body>
    <script>
        // Get the template name from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const templateName = urlParams.get('template');
        
        if (!templateName) {
            document.body.innerHTML = '<p style="text-align: center; padding: 50px; color: #666;">No template selected</p>';
        } else {
            // Load the template file
            fetch(`renderer/public/templates/${templateName}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Template not found: ${templateName}`);
                    }
                    return response.text();
                })
                .then(html => {
                    // Replace template variables with sample data
                    const sampleData = {
                        '{{todayStr}}': '15/01/2025',
                        '{{main_logo_src}}': 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTAiIGhlaWdodD0iNTAiIHZpZXdCb3g9IjAgMCA1MCA1MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMjUiIGN5PSIyNSIgcj0iMjUiIGZpbGw9IiMwMDc2ZmYiLz4KPHR0ZXh0IHg9IjUwJSIgeT0iNTAlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSJ3aGl0ZSIgZm9udC1zaXplPSIxNCIgZm9udC1mYW1pbHk9IkFyaWFsIj5TQTwvdGV4dD4KPHN2Zz4K',
                        '{{customer_name}}': 'John Smith',
                        '{{customer_phone}}': '+971 50 123 4567',
                        '{{customer_email}}': 'john.smith@email.com',
                        '{{model_year}}': '2022',
                        '{{vehicle_model}}': 'Mercedes-Benz C-Class',
                        '{{mileage_display}}': '25,000 km',
                        '{{chassis_number}}': 'WDD2050461A123456',
                        '{{cost_price_formatted}}': '185,000',
                        '{{advertised_price_formatted}}': '195,000',
                        '{{registration_expiry_formatted}}': '15/12/2025',
                        '{{insurance_expiry_formatted}}': '20/11/2025',
                        '{{damage_disclosure_details}}': 'Minor scratch on rear bumper from parking incident in 2023. Professionally repaired.',
                        '{{accident_yes_checked}}': '',
                        '{{accident_no_checked}}': 'checked',
                        '{{flood_yes_checked}}': '',
                        '{{flood_no_checked}}': 'checked',
                        '{{service_records_yes_checked}}': 'checked',
                        '{{service_records_no_checked}}': '',
                        '{{owners_manual_yes_checked}}': 'checked',
                        '{{owners_manual_no_checked}}': '',
                        '{{spare_tyre_yes_checked}}': 'checked',
                        '{{spare_tyre_no_checked}}': '',
                        '{{fire_extinguisher_yes_checked}}': '',
                        '{{fire_extinguisher_no_checked}}': 'checked'
                    };
                    
                    // Replace all template variables
                    let processedHtml = html;
                    Object.entries(sampleData).forEach(([key, value]) => {
                        const regex = new RegExp(key.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
                        processedHtml = processedHtml.replace(regex, value);
                    });
                    
                    // Write the processed HTML to the document
                    document.open();
                    document.write(processedHtml);
                    document.close();
                })
                .catch(error => {
                    document.body.innerHTML = `
                        <div style="text-align: center; padding: 50px; color: #d32f2f;">
                            <h3>❌ Error Loading Template</h3>
                            <p>${error.message}</p>
                            <p style="color: #666; font-size: 14px;">Make sure the template file exists in: <code>renderer/public/templates/${templateName}</code></p>
                        </div>
                    `;
                });
        }
    </script>
</body>
</html>
