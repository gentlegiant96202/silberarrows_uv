<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{year}} {{model}} | UV Catalog</title>
  
  <!-- Preload critical Resonate fonts (woff2 first) -->
  <link rel="preload" href="/Fonts/Resonate-Black.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/Fonts/Resonate-Regular.woff2" as="font" type="font/woff2" crossorigin>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @font-face {
      font-family: 'Resonate';
      src: url('/Fonts/Resonate-Black.woff2') format('woff2'),
           url('/Fonts/Resonate-Black.otf') format('opentype');
      font-weight: 900;
      font-style: normal;
      font-display: swap;
      font-synthesis: none;
    }
    @font-face {
      font-family: 'Resonate';
      src: url('/Fonts/Resonate-Regular.woff2') format('woff2'),
           url('/Fonts/Resonate-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
      font-synthesis: none;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000000; /* pitch black like price drop */
      color: #ffffff;
      height: 100vh;
      width: 100vw;
      padding: 0;
      margin: 0;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      font-synthesis: none; /* prevent faux bold/italic */
    }

    .catalog-card-container {
      position: relative;
      width: 1080px;
      height: 1350px; /* 4:5 aspect ratio */
      background: linear-gradient(45deg, #1bfc06, #2eff14, #1bfc06, #0ef800);
      background-size: 400% 400%;
      animation: fluorescent-glow 3s ease-in-out infinite alternate;
      border-radius: 0;
      padding: 20px; /* Fluorescent border thickness */
      box-sizing: border-box;
    }

    @keyframes fluorescent-glow {
      0% {
        background-position: 0% 50%;
        filter: brightness(1) saturate(1.2);
      }
      100% {
        background-position: 100% 50%;
        filter: brightness(1.2) saturate(1.5);
      }
    }

    .catalog-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      border-radius: 0;
    }

    .catalog-bg-image {
      position: absolute;
      top: -95px; /* Move image 7% higher - removed black bar */
      left: 0;
      width: 100%;
      height: calc(100% + 95px); /* Compensate for top offset */
      object-fit: contain; /* Show full image */
      object-position: center; /* Center positioning */
      z-index: 1;
      background: #f5f5f5; /* Light background for better contrast */
    }

    .content-section {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 462px; /* 10% bigger than 420px */
      padding: 30px 28px 30px 28px; /* More padding for taller overlay */
      display: flex;
      flex-direction: column;
      justify-content: space-between; /* Better distribution */
      gap: 18px; /* Slightly larger gap */
      background: rgba(0, 0, 0, 0.85); /* More transparent for glass effect */
      backdrop-filter: blur(15px); /* Strong glass morphism */
      -webkit-backdrop-filter: blur(15px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 2;
    }

    .header h1 {
      font-family: 'Resonate', 'Space Grotesk', sans-serif;
      font-size: 3.2rem; /* Bigger */
      font-weight: 900; /* Black */
      line-height: 1.0;
      margin-bottom: 8px;
      color: #ffffff; /* solid white so weight shows clearly */
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      letter-spacing: 1px;
      font-synthesis: none;
    }

    .subtitle {
      font-size: 1.4rem; /* Bigger */
      color: #aaaaaa;
      font-weight: 400; /* Regular */
      margin-bottom: 12px;
    }

    .highlight {
      color: #ffffff;
      font-weight: 600;
    }

    .specs-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .spec-item {
      background: rgba(255, 255, 255, 0.08);
      padding: 18px 16px;
      border-radius: 14px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .spec-value {
      font-family: 'Resonate', 'Space Grotesk', sans-serif;
      font-size: 1.8rem;
      font-weight: 900; /* Black */
      margin-bottom: 6px;
      color: #ffffff; /* solid white */
      font-synthesis: none;
    }

    .spec-label {
      font-size: 0.9rem;
      color: #888888;
      text-transform: uppercase;
      font-weight: 400; /* Regular */
      letter-spacing: 0.5px;
    }

    /* Global Resonate enforcement */
    * { font-family: 'Resonate', 'Space Grotesk', sans-serif !important; }
    *:not(i):not(.fas):not(.far):not(.fab):not(.fal) { font-family: 'Resonate', 'Space Grotesk', sans-serif !important; }
    h1, h2, h3, h4, h5, h6, p, span, div { font-family: 'Resonate', 'Space Grotesk', sans-serif !important; }
    .header h1 { font-weight: 900 !important; }
    .spec-value { font-weight: 900 !important; }
    .spec-label, .subtitle { font-weight: 400 !important; }
  </style>
</head>
<body style="font-family: 'Resonate', 'Inter', sans-serif; -webkit-font-smoothing: antialiased; font-synthesis: none;">
  <style>
    /* Inline styles like content pillars for better font loading */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    *:not(i):not(.fas):not(.far):not(.fab):not(.fal) { font-family: 'Resonate', 'Inter', sans-serif !important; }
    h1, h2, h3, h4, h5, h6, p, span, div { font-family: 'Resonate', 'Inter', sans-serif !important; }
    body { font-family: 'Resonate', 'Inter', sans-serif; }

    /* Force Resonate Black for specific elements */
    .header h1 { font-family: 'Resonate' !important; font-weight: 900 !important; font-synthesis: none !important; }
    .spec-value { font-family: 'Resonate' !important; font-weight: 900 !important; font-synthesis: none !important; }
  </style>
  <div class="catalog-card-container">
    <div class="catalog-card-inner">
      <!-- Full Background Image -->
      <img src="{{catalogImageUrl}}" alt="{{year}} {{model}}" class="catalog-bg-image" onerror="this.style.display='none';" />
      
      <!-- Content Overlay (Bottom) -->
      <div class="content-section">
        <div class="header">
          <h1>{{year}} {{model}}</h1>
          <p class="subtitle"><span class="highlight">Premium Selection</span></p>
        </div>

      <div class="specs-grid">
        <!-- Top Row -->
        <div class="spec-item">
          <div class="spec-value">AED {{originalPrice}}</div>
          <div class="spec-label">Cash Price</div>
        </div>
        <div class="spec-item">
          <div class="spec-value">AED {{zeroDownPayment}}</div>
          <div class="spec-label">0% Down Payment</div>
        </div>
        <div class="spec-item">
          <div class="spec-value">AED {{twentyDownPayment}}</div>
          <div class="spec-label">20% Down Payment</div>
        </div>
        
        <!-- Bottom Row -->
        <div class="spec-item">
          <div class="spec-value">{{mileage}} KM</div>
          <div class="spec-label">Mileage</div>
        </div>
        <div class="spec-item">
          <div class="spec-value">{{horsepower}} HP</div>
          <div class="spec-label">Horsepower</div>
        </div>
        <div class="spec-item">
          <div class="spec-value">{{engine}}</div>
          <div class="spec-label">Engine</div>
        </div>
      </div>

      <!-- Removed price footer cards as requested -->
      </div>
    </div>
  </div>
</body>
</html>
